<section class="contacts__form" id="form">
  <div class="contacts__form-wrapper">
    <h2 class="title contacts__form-title">Обратная связь</h2>
    <p class="contacts__form-description text-m">
      Оставьте свои вопросы и комментарии в форме обратной связи. Мы всегда рады услышать ваше мнение и ответить на
      ваши
      вопросы.
    </p>

    <form action="/files/sendmail.php" method="POST" class="form" id="consultation-form">
      <div class="form__row">
        <div class="form__group">
          <label for="name" class="form__label">Ваше имя</label>
          <input type="text" name="name" id="name" class="form__input" placeholder="Имя" minlength="2" maxlength="20"
            required>
          <span class="form__error"></span>
        </div>

        <div class="form__group">
          <label for="phone" class="form__label">Ваш номер телефона</label>
          <input type="tel" name="phone" id="phone" class="form__input" placeholder="+7 (___) ___-__-__" required>
          <span class="form__error"></span>
        </div>
      </div>

      <div class="form__group form__group--full">
        <label for="comment" class="form__label">Предпочтения по стилю интерьера</label>
        <textarea name="comment" id="comment" class="form__input form__textarea" placeholder="Комментарий"></textarea>
      </div>

      <button type="submit" class="button btn-d form__button">Записаться</button>
      <div class="form__status"></div>
    </form>
  </div>
</section>
